<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Link Modal</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-brands/css/uicons-brands.css'>
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/uicons-regular-rounded/css/uicons-regular-rounded.css'>
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-white m-0 p-0 overflow-hidden h-full w-full relative">
    <div id="root" class="w-full h-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const FEATURE_CARDS = [
            { id: 'collection', title: 'Collection', icon: 'fi fi-rr-layer-plus', color: 'bg-blue-50 text-blue-600' },
            { id: 'link', title: 'Link', icon: 'fi fi-rr-link', color: 'bg-indigo-50 text-indigo-600' },
            { id: 'product', title: 'Product', icon: 'fi fi-rr-shopping-bag', color: 'bg-emerald-50 text-emerald-600' },
            { id: 'form', title: 'Form', icon: 'fi fi-rr-comment-alt', color: 'bg-amber-50 text-amber-600' },
        ];

        const CATEGORIES = [
            'Suggested', 'Commerce', 'Social', 'Contact', 'Grow audience', 'Media', 'Events', 'Text & Content', 'View all'
        ];

        const APPS = [
            // Suggested/Popular
            { id: 'instagram', cat: 'Suggested', title: 'Instagram', desc: 'Display your posts and reels', icon: 'fi fi-brands-instagram', urlPrefix: 'https://instagram.com/' },
            { id: 'tiktok', cat: 'Suggested', title: 'TikTok', desc: 'Share your TikToks directly', icon: 'fi fi-brands-tiktok', urlPrefix: 'https://tiktok.com/@' },
            { id: 'youtube', cat: 'Suggested', title: 'YouTube', desc: 'Show your visitors any YouTube video', icon: 'fi fi-brands-youtube', urlPrefix: 'https://youtube.com/@' },
            { id: 'spotify', cat: 'Suggested', title: 'Spotify', desc: 'Keep your visitors in touch with the sounds', icon: 'fi fi-brands-spotify', urlPrefix: 'https://open.spotify.com/user/' },

            // Commerce
            { id: 'shopify', cat: 'Commerce', title: 'Shopify', desc: 'Add your Shopify store', icon: 'fi fi-brands-shopify', urlPrefix: 'https://' },
            { id: 'spring', cat: 'Commerce', title: 'Spring', desc: 'Sell your custom merch', icon: 'fi fi-rr-shopping-cart', urlPrefix: 'https://' },
            { id: 'ebay', cat: 'Commerce', title: 'eBay', desc: 'Showcase your eBay listings', icon: 'fi fi-brands-ebay', urlPrefix: 'https://' },
            { id: 'amazon', cat: 'Commerce', title: 'Amazon', desc: 'Link to your Amazon Influencer page', icon: 'fi fi-brands-amazon', urlPrefix: 'https://' },
            { id: 'support', cat: 'Commerce', title: 'Support Me', desc: 'Collect tips and donations', icon: 'fi fi-rr-heart', urlPrefix: 'https://' },

            // Social
            { id: 'discord', cat: 'Social', title: 'Discord', desc: 'Build your community on Discord', icon: 'fi fi-brands-discord', urlPrefix: 'https://discord.gg/' },
            { id: 'x', cat: 'Social', title: 'X', desc: 'Use X app to select your own posts', icon: 'fi fi-brands-twitter-alt', urlPrefix: 'https://x.com/' },
            { id: 'threads', cat: 'Social', title: 'Threads', desc: 'Share your latest Threads', icon: 'fi fi-brands-threads', urlPrefix: 'https://threads.net/@' },
            { id: 'facebook', cat: 'Social', title: 'Facebook', desc: 'Show your visitors your Facebook page', icon: 'fi fi-brands-facebook', urlPrefix: 'https://facebook.com/' },

            // Contact
            { id: 'contact_form', cat: 'Contact', title: 'Contact Form', desc: 'Collect info with a form', icon: 'fi fi-rr-address-book', urlPrefix: 'https://' },
            { id: 'email_signup', cat: 'Contact', title: 'Email Signup', desc: 'Collect emails', icon: 'fi fi-rr-envelope-open-text', urlPrefix: 'https://' },
            { id: 'sms_signup', cat: 'Contact', title: 'SMS Signup', desc: 'Collect phone numbers', icon: 'fi fi-rr-comment-sms', urlPrefix: 'https://' },

            // Grow audience
            { id: 'newsletter', cat: 'Grow audience', title: 'Newsletter', desc: 'Get fans to sign up to your newsletter', icon: 'fi fi-rr-envelope', urlPrefix: 'https://' },
            { id: 'community', cat: 'Grow audience', title: 'Community', desc: 'Text your audience directly', icon: 'fi fi-rr-users', urlPrefix: 'https://' },

            // Media
            { id: 'video', cat: 'Media', title: 'Video', desc: 'Add videos from anywhere', icon: 'fi fi-rr-video-camera-alt', urlPrefix: 'https://' },
            { id: 'music', cat: 'Media', title: 'Music', desc: 'Share your music across platforms', icon: 'fi fi-rr-music', urlPrefix: 'https://' },
            { id: 'podcasts', cat: 'Media', title: 'Podcasts', desc: 'Share your latest episodes', icon: 'fi fi-rr-microphone', urlPrefix: 'https://' },

            // Events
            { id: 'tour', cat: 'Events', title: 'Tour & Events', desc: 'Promote your upcoming shows', icon: 'fi fi-rr-map-marker', urlPrefix: 'https://' },

            // Text & Content
            { id: 'text', cat: 'Text & Content', title: 'Text', desc: 'Display custom text on your Monkey', icon: 'fi fi-rr-text', urlPrefix: '' },
            { id: 'header', cat: 'Text & Content', title: 'Header', desc: 'Add a header to organize your links', icon: 'fi fi-rr-heading', urlPrefix: '' }
        ];

        function ModalApp() {
            const [search, setSearch] = useState('');
            const [activeCategory, setActiveCategory] = useState('Suggested');
            const [selectedApp, setSelectedApp] = useState(null);
            const [handleInput, setHandleInput] = useState('');

            useEffect(() => {
                const handleMessage = (event) => {
                    if (event.data.type === 'SET_TAB') {
                        const matchedCat = CATEGORIES.find(c => c.toLowerCase() === event.data.tab.toLowerCase());
                        if (matchedCat) setActiveCategory(matchedCat);
                    }
                };
                window.addEventListener('message', handleMessage);
                return () => window.removeEventListener('message', handleMessage);
            }, []);

            const closeModal = () => {
                window.parent.postMessage({ type: 'CLOSE_MODAL' }, '*');
            };

            const handleAddApp = () => {
                if (!selectedApp) return;
                
                let finalUrl = handleInput.trim();
                if (!finalUrl) return;

                if (selectedApp.urlPrefix && !finalUrl.startsWith('http')) {
                    finalUrl = selectedApp.urlPrefix + finalUrl;
                }

                window.parent.postMessage({
                    type: 'ADD_LINK',
                    payload: {
                        title: selectedApp.title,
                        url: finalUrl,
                        icon: selectedApp.icon
                    }
                }, '*');
            };

            const filteredApps = useMemo(() => {
                let list = APPS;
                if (search) {
                    const lSearch = search.toLowerCase();
                    return list.filter(app => app.title.toLowerCase().includes(lSearch) || app.desc.toLowerCase().includes(lSearch));
                }
                if (activeCategory === 'View all') return list;
                return list.filter(app => app.cat === activeCategory);
            }, [search, activeCategory]);

            return (
                <div className="w-full h-full flex flex-col bg-white overflow-hidden relative">
                    
                    {/* Header */}
                    <div className="px-6 py-4 flex justify-between items-center bg-white shrink-0 border-b border-gray-100">
                        <h3 className="font-bold text-xl text-slate-900">Add Link or App</h3>
                        <button onClick={closeModal} className="p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-500">
                            <i className="fi fi-rr-cross-small text-xl leading-none"></i>
                        </button>
                    </div>

                    {/* Search Zone */}
                    <div className="px-6 py-4 shrink-0 bg-gray-50/50">
                        <div className="relative">
                            <i className="fi fi-rr-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 mt-0.5"></i>
                            <input 
                                type="text" 
                                placeholder="Paste or search a link" 
                                value={search}
                                onChange={(e) => setSearch(e.target.value)}
                                className="w-full pl-11 pr-4 py-3.5 bg-white border border-gray-200 rounded-2xl outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10 transition-all font-medium text-[15px] text-slate-900 placeholder-gray-400 shadow-sm"
                            />
                        </div>

                        {!search && (
                            <div className="grid grid-cols-4 gap-4 mt-6">
                                {FEATURE_CARDS.map(card => (
                                    <button key={card.id} className="group flex flex-col items-center gap-2">
                                        <div className={`aspect-square w-full ${card.color} rounded-[28px] border border-transparent group-hover:border-current flex items-center justify-center transition-all group-hover:-translate-y-1 group-hover:shadow-lg`}>
                                            <i className={`${card.icon} text-2xl`}></i>
                                        </div>
                                        <span className="text-[11px] font-bold text-slate-600 uppercase tracking-wider">{card.title}</span>
                                    </button>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Main Content Split */}
                    <div className="flex flex-1 overflow-hidden bg-white">
                        
                        {/* Sidebar Categories */}
                        <div className="w-[240px] border-r border-gray-100 overflow-y-auto no-scrollbar shrink-0 py-4 hidden sm:block">
                            <div className="space-y-1 px-3">
                                {CATEGORIES.map(cat => {
                                    const isActive = activeCategory === cat;
                                    return (
                                        <button 
                                            key={cat}
                                            onClick={() => setActiveCategory(cat)}
                                            className={`w-full flex items-center gap-3 px-4 py-3.5 text-left rounded-xl transition-all font-bold text-[14px] ${
                                                isActive 
                                                ? 'bg-blue-50 text-blue-600' 
                                                : 'text-gray-500 hover:bg-gray-50 hover:text-gray-900'
                                            }`}
                                        >
                                            {cat}
                                        </button>
                                    );
                                })}
                            </div>
                        </div>

                        {/* List Area */}
                        <div className="flex-1 overflow-y-auto p-6 bg-white pb-20">
                            <div className="mb-6 flex items-center justify-between">
                                <h4 className="font-bold text-lg text-slate-900">{search ? 'Search results' : activeCategory}</h4>
                                {!search && <span className="text-xs font-bold text-gray-400 uppercase tracking-widest">{filteredApps.length} Apps</span>}
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {filteredApps.map(app => (
                                    <button 
                                        key={app.id}
                                        onClick={() => { setSelectedApp(app); setHandleInput(''); }}
                                        className="w-full text-left flex items-center gap-4 p-4 bg-white border border-gray-100 rounded-2xl transition-all group hover:border-blue-200 hover:shadow-xl hover:shadow-blue-500/5 relative overflow-hidden"
                                    >
                                        <div className="w-12 h-12 rounded-[14px] flex items-center justify-center shrink-0 border border-gray-100 bg-gray-50 group-hover:bg-white group-hover:scale-110 transition-all text-2xl text-slate-800">
                                            <i className={app.icon}></i>
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <h4 className="font-bold text-[15px] text-slate-900 group-hover:text-blue-600 transition-colors">{app.title}</h4>
                                            <p className="text-[12px] text-gray-500 font-medium truncate">{app.desc}</p>
                                        </div>
                                        <div className="w-8 h-8 rounded-full flex items-center justify-center bg-gray-50 group-hover:bg-blue-600 group-hover:text-white transition-all">
                                            <i className="fi fi-rr-plus-small text-xl leading-none"></i>
                                        </div>
                                    </button>
                                ))}
                                {filteredApps.length === 0 && (
                                    <div className="col-span-full text-center py-20 text-gray-400 font-medium space-y-4">
                                        <div className="w-20 h-20 bg-gray-50 rounded-full flex items-center justify-center mx-auto">
                                            <i className="fi fi-rr-search text-3xl"></i>
                                        </div>
                                        <p>No apps found in this category.</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Secondary Popup for Handle Entry */}
                    {selectedApp && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center p-6 bg-slate-900/40 backdrop-blur-sm animate-fade-in">
                            <div className="bg-white rounded-[32px] w-full max-w-[480px] shadow-2xl p-8 border border-white/20 relative">
                                <div className="flex justify-between items-center mb-8">
                                    <div className="flex items-center gap-4">
                                        <div className="w-14 h-14 rounded-2xl bg-blue-50 text-blue-600 flex items-center justify-center text-3xl">
                                            <i className={selectedApp.icon}></i>
                                        </div>
                                        <div>
                                            <h3 className="font-bold text-2xl text-slate-900">Add {selectedApp.title}</h3>
                                            <p className="text-sm font-medium text-gray-500">{selectedApp.desc}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setSelectedApp(null)} className="p-2 hover:bg-gray-100 rounded-full transition-colors text-gray-500">
                                        <i className="fi fi-rr-cross-small text-xl leading-none"></i>
                                    </button>
                                </div>
                                
                                <div className="mb-8 space-y-3">
                                    <label className="text-sm font-bold text-gray-700 ml-1 flex items-center gap-2">
                                        Enter your {selectedApp.title} link <i className="fi fi-rr-info text-[10px] text-gray-300"></i>
                                    </label>
                                    <div className="relative">
                                        <input 
                                            type="text" 
                                            autoFocus
                                            placeholder={`@username or full URL`}
                                            value={handleInput}
                                            onChange={(e) => setHandleInput(e.target.value)}
                                            className="w-full px-5 py-4.5 bg-gray-50 border-2 border-transparent focus:border-blue-600 rounded-2xl outline-none focus:bg-white focus:ring-8 focus:ring-blue-600/5 transition-all font-semibold text-[16px] text-slate-900 placeholder-gray-400" 
                                        />
                                    </div>
                                </div>
                                <div className="flex gap-4 pt-2">
                                    <button onClick={() => setSelectedApp(null)} className="flex-1 py-4 bg-gray-100 hover:bg-gray-200 text-gray-600 font-bold rounded-2xl transition-all">Go back</button>
                                    <button 
                                        onClick={handleAddApp} 
                                        disabled={!handleInput.trim()}
                                        className="flex-1 py-4 bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold rounded-2xl transition-all shadow-xl shadow-blue-600/20"
                                    >
                                        Add to Monkey
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ModalApp />);
    </script>
</body>
</html>
