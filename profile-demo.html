<body class="bg-gray-50 text-secondary min-h-screen flex flex-col ">
  
      <!-- Public Profile Page Design -->
      <div class="min-h-screen w-full relative overflow-x-hidden flex items-center justify-center py-12 px-4 sm:px-0" style="background: linear-gradient(135deg, #1e293b, #0f172a);">
         <div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
            <div class="spline-orb" style="width: 400px; height: 400px; background: #43E660; top: -10%; left: -10%; opacity: 0.15;"></div>
            <div class="spline-orb" style="width: 500px; height: 500px; background: #6cf383; bottom: -20%; right: -10%; opacity: 0.1; animation-delay: -5s;"></div>
         </div>
         
         <div class="w-full max-w-[480px] bg-white/10 backdrop-blur-xl border border-white/20 rounded-[40px] p-8 pb-12 shadow-2xl relative z-10 text-center animate-fade-in opacity-0">
            <img id="profile-img" src="https://i.pravatar.cc/150?u=profile-demo.html" alt="Profile Image" class="w-24 h-24 rounded-full border-4 border-white/20 mx-auto shadow-lg mb-4 object-cover">
            <h1 id="profile-name" class="text-2xl font-bold text-white mb-1 flex items-center justify-center gap-1">Alex Rivera <i data-lucide="badge-check" class="w-5 h-5 text-primary"></i></h1>
            <p id="profile-bio" class="text-white/80 font-medium mb-6">Digital Creator & Minimalist ✨</p>
            
            <script>
              document.addEventListener('DOMContentLoaded', async () => {
                const urlParams = new URLSearchParams(window.location.search);
                const username = urlParams.get('u');
                
                if (username) {
                  const client = window.supabaseClient || window.supabase;
                  if (client) {
                    const { data: profile } = await client
                      .from('monkey_bio')
                      .select('*')
                      .eq('username', username)
                      .single();
                    
                    if (profile) {
                      document.getElementById('profile-name').innerHTML = (profile.display_name || username) + ' <i data-lucide="badge-check" class="w-5 h-5 text-primary"></i>';
                      document.getElementById('profile-img').src = 'https://i.pravatar.cc/150?u=' + profile.id;
                      // Refresh lucide icons for the newly added badge
                      if (window.lucide) window.lucide.createIcons();
                    }
                  }
                }
              });
            </script>
            
            <div class="flex justify-center gap-4 mb-8">

  <!-- Mock Spline/Interactive background simulation logic -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const bg = document.getElementById('spline-bg');
      if (bg) {
        window.addEventListener('mousemove', (e) => {
             const x = e.clientX / window.innerWidth;
             const y = e.clientY / window.innerHeight;
             // Slow elegant motion mapping
             bg.style.transform = "translate(-" + (x * 30) + "px, -" + (y * 30) + "px) scale(1.05)";
        });
      }
    });
  </script>
